name: automerge

on:
  workflow_call:
    inputs:
      max-update-type:
        description: "Widest update type to auto-merge: patch, minor, or major"
        type: string
        default: minor

jobs:
  automerge:
    if: github.actor == 'dependabot[bot]'
    name: Enable auto-merge on Dependabot PR
    runs-on: ubuntu-latest
    steps:
      - id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          (inputs.max-update-type != 'patch' && steps.metadata.outputs.update-type == 'version-update:semver-minor') ||
          (inputs.max-update-type == 'major' && steps.metadata.outputs.update-type == 'version-update:semver-major')
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
